<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hadaya Special</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Arial,sans-serif;
    background:#f7f7f7;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}
.container{
    background:#fff;
    width:100%;
    max-width:520px;
    padding:30px;
    border-radius:24px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
    text-align:center;
}
.logo{
    width:140px;
    margin-bottom:15px;
}
.lang-buttons button{
    background:#8b5cf6;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
    margin:3px;
}
h1{color:#e11d48;margin:10px 0}
h2{color:#555;font-size:18px;margin-bottom:20px}
ul{text-align:left;line-height:1.9;color:#333;margin-bottom:20px;padding-left:22px}
.google-play img{
    width:240px;
    max-width:100%;
    transition:.25s;
}
.google-play img:hover{
    transform:scale(1.05);
}
.buttons{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:15px;
}
.btn{
    text-decoration:none;
    color:white;
    padding:14px;
    border-radius:12px;
    font-weight:bold;
    transition:.25s;
}
.btn:hover{
    transform:translateY(-2px);
}
.facebook{background:#1877f2}
.whatsapp{background:#25d366}
.instagram{
    background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
}
footer{
    margin-top:20px;
    color:#666;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

<div class="lang-buttons">
<button onclick="setLang('en')">English</button>
<button onclick="setLang('ar')">العربية</button>
<button onclick="setLang('fr')">Français</button>
</div>

<img class="logo" src="https://raw.githubusercontent.com/AbdallaBadreldin/hadaya_special_links/refs/heads/main/hadaya_logo.png">

<h1 id="title"></h1>
<h2 id="subtitle"></h2>

<div class="google-play">
<a href="https://play.google.com/store/apps/details?id=client.fstech.hadaya" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Google Play">
</a>
</div>

<ul>
<li id="item1"></li>
<li id="item2"></li>
<li id="item3"></li>
<li id="item4"></li>
<li id="item5"></li>
</ul>

<div class="buttons">
<a href="https://www.facebook.com/Hadaya.Special" target="_blank" class="btn facebook" id="facebook"></a>
<a href="https://wa.me/201501166734" target="_blank" class="btn whatsapp" id="whatsapp"></a>
<a href="https://www.instagram.com/hadaya.special" target="_blank" class="btn instagram" id="instagram"></a>
</div>

<footer id="footer"></footer>

</div>

<script>
const langData={
en:{
title:"Hadaya Special",
subtitle:"Your Custom Gift Destination 🎁",
item1:"Create custom gifts",
item2:"Print mugs",
item3:"Print t-shirts",
item4:"Print caps",
item5:"And more... Contact us today!",
facebook:"Facebook",
whatsapp:"WhatsApp",
instagram:"Instagram",
footer:"Made with ❤️ by Hadaya Special"
},
ar:{
title:"هدايا مميزة",
subtitle:"وجهتك للهدايا المخصصة 🎁",
item1:"تصميم هدايا مخصصة",
item2:"طباعة مجات",
item3:"طباعة تيشيرتات",
item4:"طباعة كابات",
item5:"والمزيد... تواصل معنا الآن!",
facebook:"فيسبوك",
whatsapp:"واتساب",
instagram:"إنستجرام",
footer:"صنع بـ ❤️ بواسطة هدايا مميزة"
},
fr:{
title:"Hadaya Special",
subtitle:"Votre destination cadeaux 🎁",
item1:"Cadeaux personnalisés",
item2:"Impression sur mugs",
item3:"Impression sur t-shirts",
item4:"Impression sur casquettes",
item5:"Et plus encore...",
facebook:"Facebook",
whatsapp:"WhatsApp",
instagram:"Instagram",
footer:"Fait avec ❤️ par Hadaya Special"
}
};

function setLang(lang){
localStorage.setItem('lang',lang);
for(let k in langData[lang]){
const el=document.getElementById(k);
if(el) el.innerText=langData[lang][k];
}
document.body.dir=lang==='ar'?'rtl':'ltr';
}

setLang(localStorage.getItem('lang')||'en');
</script>

</body>
</html>
